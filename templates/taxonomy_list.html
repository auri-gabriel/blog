{% extends "base.html" %} {% block content %}
<section class="bg-light py-5 border-bottom">
  <div class="container">
    <h1 class="display-6 fw-bold mb-2">{{ taxonomy.name | title }}</h1>
    <p class="text-muted mb-0">Browse posts by {{ taxonomy.name }}.</p>
  </div>
</section>

<section class="py-5">
  <div class="container">
    <div class="row g-3">
      {% for term in terms %}
      <div class="col-sm-6 col-lg-4">
        <a
          href="{{ term.permalink }}"
          class="card h-100 border-0 text-decoration-none post-card post-term-card"
        >
          <div class="card-body d-flex flex-column">
            <p class="post-card-meta mb-2">{{ taxonomy.name | title }}</p>
            <h2 class="post-card-title h5 mb-1">{{ term.name }}</h2>
            <p class="post-card-excerpt mb-0 small">
              {{ term.pages | length }} post(s)
            </p>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock content %}
